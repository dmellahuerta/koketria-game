<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>misterrii network</title>
    <meta name="theme-color" content="#030603" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="misterrii network" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="matrix-bg" aria-hidden="true"></div>
    <main class="container">
      <header class="hero">
        <p class="eyebrow">MISTERRII NETWORK</p>
        <h1>Juegos Disponibles</h1>
        <p class="subtitle">Selecciona una partida y entra al sistema.</p>
      </header>

      <section class="panel">
        <h2>Listado</h2>
        <ul class="games">
          <li class="game-item">
            <div class="game-meta">
              <span class="name">koketria-game</span>
              <span class="status">ONLINE</span>
            </div>
            <div class="play-links">
              <a class="play-link is-dev" data-env="dev" href="http://localhost:5173">Entrar</a>
              <a class="play-link" data-env="prod" href="https://koketria.misterrii.com">Entrar</a>
            </div>
          </li>
        </ul>
      </section>
    </main>
    <script>
      (function () {
        var host = window.location.hostname;
        var isDev = host === 'localhost' || host === '127.0.0.1' || host.endsWith('.local');
        var showEnv = isDev ? 'dev' : 'prod';
        document.querySelectorAll('[data-env]').forEach(function (el) {
          if (el.getAttribute('data-env') !== showEnv) {
            el.classList.add('hidden-link');
          }
        });

        var isProdHost = /(^|\.)misterrii\.com$/i.test(host);
        var isHttps = window.location.protocol === 'https:';
        if ('serviceWorker' in navigator && isProdHost && isHttps) {
          window.addEventListener('load', function () {
            navigator.serviceWorker.register('/sw.js').catch(function () {});
          });
        }
      })();
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Koketria Config</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #06110a;
        --panel: #0b2012;
        --line: rgba(118, 255, 118, 0.32);
        --text: #d7ffd7;
        --muted: #9ac59a;
      }
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 20% 0%, #0e2818 0%, var(--bg) 55%);
        color: var(--text);
        font: 14px/1.4 Consolas, 'Courier New', monospace;
      }
      #app {
        display: grid;
        grid-template-columns: minmax(280px, 340px) minmax(0, 1fr);
        height: 100%;
      }
      .panel {
        border-right: 1px solid var(--line);
        background: rgba(8, 26, 14, 0.88);
        padding: 14px;
        overflow: auto;
      }
      .panel h1 {
        margin: 0 0 10px;
        font-size: 1rem;
        letter-spacing: 0.05em;
      }
      .panel p {
        margin: 0 0 10px;
        color: var(--muted);
        font-size: 0.82rem;
      }
      .field {
        margin: 10px 0;
      }
      .field label {
        display: block;
        margin-bottom: 6px;
        font-size: 0.82rem;
      }
      .field input,
      .field select,
      .field button,
      .field textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid var(--line);
        background: #0a1f11;
        color: var(--text);
        border-radius: 8px;
        padding: 8px;
        font: inherit;
      }
      .field textarea {
        min-height: 120px;
        resize: vertical;
      }
      .value {
        color: #b7ffb7;
        font-size: 0.8rem;
      }
      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .viewport {
        position: relative;
      }
      #canvasWrap {
        position: absolute;
        inset: 0;
      }
      .badge {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 5;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(5, 20, 10, 0.82);
        padding: 6px 8px;
        font-size: 0.78rem;
      }
      .error {
        color: #ff9f9f;
      }
      @media (max-width: 900px) {
        #app {
          grid-template-columns: 1fr;
          grid-template-rows: auto minmax(0, 1fr);
        }
        .panel {
          border-right: none;
          border-bottom: 1px solid var(--line);
          max-height: 46vh;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/config.js"></script>
  </body>
</html>

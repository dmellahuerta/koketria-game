<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Koketria Map Editor</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050e08;
        --panel: #0b1d12;
        --line: rgba(130, 255, 150, 0.28);
        --text: #d9ffe3;
        --muted: #95c7a6;
      }
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 20% 0%, #10281a 0%, var(--bg) 56%);
        color: var(--text);
        font: 14px/1.4 Consolas, 'Courier New', monospace;
      }
      #app {
        display: grid;
        grid-template-columns: minmax(280px, 340px) minmax(0, 1fr);
        height: 100%;
      }
      .panel {
        border-right: 1px solid var(--line);
        background: rgba(7, 24, 14, 0.9);
        padding: 14px;
        overflow: auto;
      }
      .panel h1 {
        margin: 0 0 10px;
        font-size: 1rem;
      }
      .panel p {
        margin: 0 0 10px;
        color: var(--muted);
        font-size: 0.82rem;
      }
      .field {
        margin: 10px 0;
      }
      .field label {
        display: block;
        margin-bottom: 6px;
        font-size: 0.82rem;
      }
      .field input,
      .field select,
      .field button,
      .field textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid var(--line);
        background: #0a1c11;
        color: var(--text);
        border-radius: 8px;
        padding: 8px;
        font: inherit;
      }
      .field textarea {
        min-height: 110px;
        resize: vertical;
      }
      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .value {
        color: #bcffc8;
      }
      .viewport {
        position: relative;
      }
      #canvasWrap {
        position: absolute;
        inset: 0;
      }
      .badge {
        position: absolute;
        left: 12px;
        top: 12px;
        z-index: 2;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 6px 8px;
        background: rgba(6, 18, 11, 0.86);
        font-size: 0.78rem;
      }
      @media (max-width: 900px) {
        #app {
          grid-template-columns: 1fr;
          grid-template-rows: auto minmax(0, 1fr);
        }
        .panel {
          border-right: none;
          border-bottom: 1px solid var(--line);
          max-height: 46vh;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/map.js"></script>
  </body>
</html>

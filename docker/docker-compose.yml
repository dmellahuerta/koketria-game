services:
  web:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ../web:/usr/share/nginx/html:ro

  backend_v2:
    build:
      context: ../game1/backend_v2
      dockerfile: Dockerfile.dev
    working_dir: /app
    command: sh -c "chmod +x /app/scripts/dev-run.sh && /app/scripts/dev-run.sh"
    ports:
      - "3001:3001"
    volumes:
      - ../game1/backend_v2:/app
      - ../game1/front/public:/front_public:ro
      - backend_v2_cargo_registry:/usr/local/cargo/registry
      - backend_v2_target:/app/target
    environment:
      - NODE_ENV=development
      - LISTEN_HOST=0.0.0.0
      - PORT=3001
      - RUST_LOG=${RUST_LOG:-debug}
      - FRONT_PUBLIC_DIR=/front_public
      - WS_PICKUP_TRACE=${WS_PICKUP_TRACE:-1}

  front:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ../game1/front:/app
      - front_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_BASE_URL=http://localhost:3001
    depends_on:
      - backend_v2

volumes:
  backend_v2_cargo_registry:
  backend_v2_target:
  front_node_modules:

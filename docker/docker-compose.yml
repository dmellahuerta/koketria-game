services:
  web:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ../web:/usr/share/nginx/html:ro

  backend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && node index.js"
    ports:
      - "3000:3000"
    volumes:
      - ../game1/backend:/app
      - backend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development

  backend_v2:
    image: rust:1.86
    working_dir: /app
    command: sh -c "cargo run --release"
    ports:
      - "3001:3001"
    volumes:
      - ../game1/backend_v2:/app
      - backend_v2_cargo_registry:/usr/local/cargo/registry
      - backend_v2_target:/app/target
    environment:
      - LISTEN_HOST=0.0.0.0
      - PORT=3001
      - BACKEND_V1_URL=http://backend:3000
    depends_on:
      - backend

  front:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ../game1/front:/app
      - front_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_BASE_URL=http://localhost:3000
    depends_on:
      - backend

volumes:
  backend_node_modules:
  backend_v2_cargo_registry:
  backend_v2_target:
  front_node_modules:

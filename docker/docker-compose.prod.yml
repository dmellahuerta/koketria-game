services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - nginx
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      - WEB_DOMAIN=${WEB_DOMAIN:-misterrii.com}
      - GAME_DOMAIN=${GAME_DOMAIN:-koketria.misterrii.com}
      - ACME_EMAIL=${ACME_EMAIL:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
      - front
    expose:
      - "80"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro

  backend_v2:
    build:
      context: ../game1/backend_v2
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    volumes:
      - ../game1/front/public:/front_public:ro
    environment:
      - LISTEN_HOST=0.0.0.0
      - PORT=3001
      - FRONT_PUBLIC_DIR=/front_public
    expose:
      - "3001"

  front:
    build:
      context: ../game1/front
      dockerfile: Dockerfile.prod
      args:
        - VITE_APP_ENV=prod
    restart: unless-stopped
    depends_on:
      - backend_v2
    expose:
      - "80"

  web:
    build:
      context: ../web
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    expose:
      - "80"

volumes:
  caddy_data:
  caddy_config:

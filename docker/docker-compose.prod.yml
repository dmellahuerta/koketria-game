services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
      - front
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro

  backend:
    build:
      context: ../game1/backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - LAG_COMP_MS=${LAG_COMP_MS:-160}
      - MAX_AIM_DELTA_DEG=${MAX_AIM_DELTA_DEG:-95}
    expose:
      - "3000"

  front:
    build:
      context: ../game1/front
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

  web:
    build:
      context: ../web
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    expose:
      - "80"
